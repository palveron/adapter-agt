name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: pip install -e .
      - name: Import smoke test
        run: python -c "import palveron_agt; print('Import OK')"
      - name: Verify no vexis remnants
        run: |
          if grep -rIni "vexis\|disruptivetrends\|vx_live\|vx_test\|gp_live\|gp_test\|x-vexis-" palveron_agt/ README.md CHANGELOG.md pyproject.toml LICENSE 2>/dev/null; then
            echo "ERROR: Found vexis remnants in source files."
            exit 1
          fi
          echo "Clean — no vexis remnants found."
